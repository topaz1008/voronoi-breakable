<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>voronoi-breakable</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<div class="page">
  <h1>voronoi-breakable</h1>
  <p class="subtitle">Breakable rigid bodies — the Voronoi diagram is computed on the fly for every impact,
    with shatter sites clustered around the contact point.</p>

  <div class="hints">
    <span><kbd>click</kbd> drop a box</span>
    <span><kbd>drag</kbd> aim &amp; launch</span>
    <span><kbd>B</kbd> shoot boxes</span>
    <span><kbd>R</kbd> reset</span>
    <span><kbd>P</kbd> pause</span>
  </div>

  <div id="canvas-container"></div>

  <footer>
    Built with <a href="https://github.com/liabru/matter-js" target="_blank" rel="noopener">matter.js</a>
    and <a href="https://github.com/d3/d3-delaunay" target="_blank" rel="noopener">d3-delaunay</a> -
    Source on <a href="https://github.com/topaz1008/voronoi-breakable" target="_blank" rel="noopener">GitHub</a>.
  </footer>
</div>

<script type="module" src="./src/main.js"></script>

</body>
</html>
